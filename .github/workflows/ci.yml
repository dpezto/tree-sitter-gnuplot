name: CI

on:
  push:
    branches: [main]
    paths:
      - grammar.js
      - src/**
      - test/**
      - bindings/**
      - binding.gyp
      - .github/workflows/ci.yml
  pull_request:
    paths:
      - grammar.js
      - src/**
      - test/**
      - bindings/**
      - binding.gyp
      - .github/workflows/ci.yml

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: reviewdog/action-actionlint@50842263c20a7c46bd0065b9e624d3c569db061e # v1

  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: tree-sitter/setup-action/cli@v2
      - uses: tree-sitter/parser-test-action@v3
        with:
          test-rust: true
          test-node: true
          test-python: true
          test-go: true
          test-swift: ${{ runner.os == 'macOS' }}

  coverage:
    # Scanner line coverage → Codecov. Only src/scanner.c is reported; parser.c
    # is generated (ignored in codecov.yml). Kept as a dedicated job because it
    # needs a custom --coverage build the matrix test action does not do.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - name: Install tree-sitter-cli
        run: npm install -g tree-sitter-cli@0.26.11
      - name: Generate parser
        run: tree-sitter generate
      - name: Run tests with coverage instrumentation
        run: tree-sitter test
        env:
          CFLAGS: --coverage -O0
      - name: Generate gcov report for scanner
        # tree-sitter builds the parser in ~/.cache/tree-sitter/lib; the .gcno
        # files reference src/scanner.c relative to the repo root, so gcov must
        # run from here. parser.c is generated, so only the scanner is reported.
        run: gcov ~/.cache/tree-sitter/lib/*-scanner.gcda
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./scanner.c.gcov
          disable_search: true
          fail_ci_if_error: false
