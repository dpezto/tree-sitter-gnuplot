name: labeler

on: [pull_request_target]

jobs:
  size:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: codelytv/pr-size-labeler@095a41fca88b8764fd9e008ad269bcdb82bb38b9 # v1
        with:
          xs_label: "size/xs"
          xs_max_size: "3"
          s_label: "size/s"
          s_max_size: "10"
          m_label: "size/m"
          m_max_size: "50"
          l_label: "size/l"
          l_max_size: "100"
          xl_label: "size/xl"
          fail_if_xl: "false"
          # Generated parser artifacts dominate diffs; exclude so labels track hand-written change.
          files_to_ignore: |
            src/parser.c
            src/grammar.json
            src/node-types.json
            package-lock.json
